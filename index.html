<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>动物城大搜捕：字词纠错特训</title>
    <style>
        :root {
            /* 疯狂动物城风格配色：警服蓝、夜景紫、霓虹光 */
            --primary: #00e5ff;    /* 霓虹蓝 */
            --secondary: #ffcc00;  /* 警徽金 */
            --accent: #ff6600;     /* 狐狸橙 */
            --bg-dark: #1a0b2e;    /* 深紫夜景 */
            --correct: #00e676; 
            --wrong: #ff4081;
            --text-main: #ffffff;
        }
        body {
            margin: 0; padding: 0; 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-dark);
            background-image: linear-gradient(135deg, #1a0b2e 0%, #431257 50%, #0d2546 100%);
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; justify-content: center; align-items: center;
            /* 防止手机点击出现蓝色高亮块 */
            -webkit-tap-highlight-color: transparent;
        }
        .game-card {
            background: rgba(45, 27, 78, 0.95); 
            border: 3px solid var(--primary); 
            border-radius: 25px;
            padding: 25px; 
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.3); 
            width: 92%; max-width: 650px; text-align: center;
            box-sizing: border-box;
            position: relative;
        }
        /* 顶部装饰条 */
        .game-card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            border-radius: 25px 25px 0 0;
        }

        .header { display: flex; justify-content: space-between; font-size: 1.1rem; color: var(--primary); margin-bottom: 15px; font-weight: bold; }
        
        .progress-track { width: 100%; height: 14px; background: #150826; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid #5a3d8a; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.3s; }
        
        .q-badge { 
            background: linear-gradient(45deg, var(--accent), #ff4081); 
            display: inline-block; padding: 5px 15px; border-radius: 15px; 
            font-size: 1rem; margin-bottom: 10px; color: white; font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 102, 0, 0.3);
        }
        
        .q-phrase-container { margin: 20px 0; min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        .q-instruction { font-size: 1.3rem; color: #ccc; margin-bottom: 10px; }
        
        /* 题目大字 */
        .q-phrase { 
            font-size: 3.2rem; 
            color: #fff; 
            text-shadow: 0 0 15px var(--primary); 
            letter-spacing: 2px; 
            font-weight: bold;
            line-height: 1.2;
        }
        .highlight-y { 
            color: var(--secondary); 
            border-bottom: 3px solid var(--secondary); 
            padding-bottom: 2px;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px;}
        .option-btn {
            background: rgba(255,255,255,0.08); 
            border: 2px solid #5a3d8a; 
            color: white;
            padding: 18px; font-size: 1.8rem; border-radius: 15px; cursor: pointer; transition: 0.2s;
            font-weight: bold;
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.correct { background: var(--correct) !important; color: #003300; border-color: var(--correct); }
        .option-btn.wrong { background: var(--wrong) !important; border-color: var(--wrong); opacity: 0.8; }
        
        .feedback-box { display: none; margin-top: 20px; padding: 15px; border: 2px dashed var(--primary); background: rgba(0,0,0,0.3); text-align: left; border-radius: 12px; }
        .fb-title { font-size: 1.5rem; font-weight: bold; display: block; margin-bottom: 5px; }
        .fb-text { font-size: 1.3rem; line-height: 1.5; color: #ddd; }
        
        .action-btn { 
            background: linear-gradient(45deg, var(--primary), #2979ff); 
            color: #002f3c; border: none; padding: 16px 0; width: 100%; font-size: 1.6rem; border-radius: 50px; 
            cursor: pointer; font-weight: 800; margin-top: 25px; 
            box-shadow: 0 5px 0 #004d40; 
        }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
        
        .input-group { margin: 20px 0; display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; }
        .custom-input, .custom-select {
            background: rgba(0,0,0,0.3); border: 2px solid var(--primary); color: var(--primary);
            padding: 12px; font-size: 1.2rem; border-radius: 12px; outline: none; text-align: center;
            width: 100%; box-sizing: border-box;
            appearance: none; -webkit-appearance: none;
        }
        .custom-select { background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2300e5ff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right .7em top 50%; background-size: .65em auto; }
        .custom-select option { background: #1a0b2e; color: #fff; }

        .wrong-list { text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-top: 15px; max-height: 180px; overflow-y: auto; font-size: 1.1rem; border: 1px solid #5a3d8a; }
        .wrong-item { color: var(--wrong); margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }

        /* 手机适配优化 */
        @media screen and (max-width: 600px) {
            .game-card { padding: 20px 15px; width: 95%; margin: 10px; }
            h1 { font-size: 2.2rem !important; }
            .q-phrase { font-size: 2.6rem; }
            .options-grid { gap: 12px; }
            .option-btn { padding: 15px; font-size: 1.5rem; }
            .fb-title { font-size: 1.4rem; }
            .fb-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div id="game-container" class="game-card">
        <div id="start-screen">
            <h1 style="font-size: 3rem; color: var(--secondary); margin: 10px 0; text-shadow: 0 0 10px var(--accent);">🦁 动物城警官特训 🐰</h1>
            <p style="font-size: 1.2rem; color: var(--primary); letter-spacing: 1px;">易错字词大搜捕 V4.0 (加强版)</p>
            
            <div style="margin: 20px 0; font-size: 1.1rem; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; border: 1px solid #5a3d8a; line-height: 1.6;">
                <p>👮 <b>新晋警官请注意：</b></p>
                <p>城里出现了一批“错别字”捣蛋鬼！系统已为你制定了 <b>20题/天</b> 的巡逻计划。</p>
                <p>请务必火眼金睛，将它们一网打尽！</p>
            </div>
            
            <div class="input-group">
                <input type="text" id="username" class="custom-input" placeholder="输入警官代号 (如: 朱迪)" maxlength="8">
                <select id="level-select" class="custom-select">
                    <option value="0">正在加载任务(如卡住请刷新)...</option>
                </select>
            </div>

            <button class="action-btn" onclick="startGame()">开始巡逻</button>
        </div>

        <div id="game-screen" style="display: none;">
            <div class="header">
                <span id="score-display">🏅 警徽: 0</span>
                <span id="count-display">任务: 1/20</span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
            
            <div id="q-type" class="q-badge"></div>
            <div class="q-phrase-container" id="q-main-display"></div>
            <div class="options-grid" id="options-grid"></div>
            
            <div class="feedback-box" id="feedback-box">
                <span id="fb-title" class="fb-title"></span>
                <p id="fb-text" class="fb-text"></p>
            </div>
            
            <button id="next-btn" class="action-btn" style="display:none" onclick="nextQuestion()">下一个案件 ➔</button>
        </div>

        <div id="result-screen" style="display: none;">
            <h1 style="font-size: 2.8rem; color: var(--secondary);">巡逻结束！</h1>
            <p style="font-size:1.3rem;">执勤警官：<span id="result-name" style="color:var(--primary); font-weight:bold;"></span></p>
            <div id="final-score" style="font-size: 4rem; margin: 15px 0; color: var(--secondary); text-shadow: 0 0 20px var(--secondary);">0</div>
            
            <div id="wrong-record-box">
                <p style="text-align:left; color:var(--wrong); font-size: 1.2rem; font-weight:bold;">📂 案件复盘（错题）：</p>
                <div class="wrong-list" id="wrong-list"></div>
            </div>
            
            <button class="action-btn" onclick="location.reload()">返回警局首页</button>
        </div>
    </div>

<script>
    // --- 1. 安全音效初始化 ---
    let AudioCtx;
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) AudioCtx = new AudioContext();
    } catch(e) {
        console.log("设备不支持音效，已静音模式运行");
    }

    function playSound(freq, type, duration) {
        if (!AudioCtx) return; 
        try {
            if(AudioCtx.state === 'suspended') AudioCtx.resume();
            const osc = AudioCtx.createOscillator();
            const gain = AudioCtx.createGain();
            osc.type = type; 
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + duration);
            osc.connect(gain); 
            gain.connect(AudioCtx.destination);
            osc.start(); 
            osc.stop(AudioCtx.currentTime + duration);
        } catch(e) {}
    }

    // --- 2. 完整题库 (含新增的100道特训题) ---
    const DB = [
        // === 原有题库 (Day 1 - Day 6) ===
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"嫉<span class='highlight-y'>妒</span>", opts:["dù", "hù"], ans:"dù", why:"嫉妒(dù)，不读hù。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"<span class='highlight-y'>凯</span>旋", opts:["kǎi", "kǎ"], ans:"kǎi", why:"凯(kǎi)旋，不读kǎ。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"<span class='highlight-y'>琐</span>碎", opts:["suǒ", "zuǒ"], ans:"suǒ", why:"琐(suǒ)碎是平舌音。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"<span class='highlight-y'>馈</span>赠", opts:["kuì", "guì"], ans:"kuì", why:"馈(kuì)赠，不是富贵(guì)。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"<span class='highlight-y'>刊</span>物", opts:["kān", "kēn"], ans:"kān", why:"刊(kān)登，不读kēn。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"客<span class='highlight-y'>栈</span>", opts:["zhàn", "zàn"], ans:"zhàn", why:"客栈(zhàn)是翘舌音。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"<span class='highlight-y'>凛</span>冽", opts:["lǐn", "lèi"], ans:"lǐn", why:"凛(lǐn)冽是三声。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"腼<span class='highlight-y'>腆</span>", opts:["tiǎn", "diǎn"], ans:"tiǎn", why:"腆(tiǎn)不读diǎn。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"<span class='highlight-y'>磁</span>铁", opts:["cí", "zí"], ans:"cí", why:"磁(cí)性是平舌音。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"鱼<span class='highlight-y'>鳞</span>", opts:["lín", "líng"], ans:"lín", why:"鱼鳞(lín)是前鼻音。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"船<span class='highlight-y'>舵</span>", opts:["duò", "tuò"], ans:"duò", why:"掌舵(duò)，不读tuò。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"<span class='highlight-y'>鉴</span>别", opts:["jiàn", "qiàn"], ans:"jiàn", why:"鉴(jiàn)定，不读qiàn。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"书<span class='highlight-y'>籍</span>", opts:["jí", "jì"], ans:"jí", why:"书籍(jí)是二声。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"湖<span class='highlight-y'>畔</span>", opts:["pàn", "bàn"], ans:"pàn", why:"湖畔(pàn)指半边，读pàn。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"比<span class='highlight-y'>喻</span>", opts:["yù", "yú"], ans:"yù", why:"比喻(yù)是四声。" },
        { t:"正音档案", inst:"选出高亮字的读音", phrase:"<span class='highlight-y'>卓</span>越", opts:["zhuó", "zhuō"], ans:"zhuó", why:"卓(zhuó)越是二声。" },
        { t:"火眼金睛", inst:"看拼音选汉字", phrase:"bǎo lěi", opts:["堡垒", "保垒"], ans:"堡垒", why:"堡垒用土筑，是土字底。" },
        { t:"火眼金睛", inst:"看拼音选汉字", phrase:"xùn liáng", opts:["驯良", "训良"], ans:"驯良", why:"驯(xùn)良指马温顺，马字旁。" },
        { t:"火眼金睛", inst:"看拼音选汉字", phrase:"tái xiǎn", opts:["苔藓", "苔鲜"], ans:"苔藓", why:"苔藓是植物，草字头。" },
        { t:"火眼金睛", inst:"看拼音选汉字", phrase:"jiǎo fèi", opts:["缴费", "交费"], ans:"缴费", why:"缴费要用手(丝字旁)。" },
        { t:"火眼金睛", inst:"看拼音选汉字", phrase:"cháo xiào", opts:["嘲笑", "潮笑"], ans:"嘲笑", why:"嘲笑用嘴(口)，潮水用水。" },
        { t:"火眼金睛", inst:"看拼音选汉字", phrase:"yī wēi", opts:["依偎", "衣偎"], ans:"依偎", why:"依偎是人挨着人，单人旁。" },
        { t:"火眼金睛", inst:"看拼音选汉字", phrase:"jī kě", opts:["饥渴", "机渴"], ans:"饥渴", why:"饥饿要吃饭(饣)。" },
        { t:"火眼金睛", inst:"选出正确字形", phrase:"<span class='highlight-y'>__</span>子", opts:["辫", "辩"], ans:"辫", why:"辫子用绳系(纟)，辩论用言语。" },
        { t:"多音侦探", inst:"选出高亮字的读音", phrase:"仇<span class='highlight-y'>敌</span>", opts:["chóu", "qiú"], ans:"chóu", why:"仇(chóu)敌，报仇。" },
        { t:"多音侦探", inst:"选出高亮字的读音", phrase:"<span class='highlight-y'>冠</span>军", opts:["guàn", "guān"], ans:"guàn", why:"第一名读guàn，帽子读guān。" },
        { t:"多音侦探", inst:"选出高亮字的读音", phrase:"发<span class='highlight-y'>酵</span>", opts:["jiào", "xiào"], ans:"jiào", why:"酵(jiào)母，不读xiào。" },
        { t:"多音侦探", inst:"选出高亮字的读音", phrase:"日<span class='highlight-y'>寇</span>", opts:["kòu", "guàn"], ans:"kòu", why:"寇(kòu)指强盗。" },
        { t:"多音侦探", inst:"选出高亮字的读音", phrase:"水<span class='highlight-y'>浒</span>", opts:["hǔ", "xǔ"], ans:"hǔ", why:"水浒(hǔ)传，不读xǔ。" },
        { t:"多音侦探", inst:"选出高亮字的读音", phrase:"烟<span class='highlight-y'>熏</span>", opts:["xūn", "xīn"], ans:"xūn", why:"熏(xūn)肉，熏黑。" },
        { t:"多音侦探", inst:"选出高亮字的读音", phrase:"<span class='highlight-y'>嫦</span>娥", opts:["cháng", "chǎng"], ans:"cháng", why:"嫦(cháng)娥奔月。" },
        { t:"同音辨析", inst:"选出正确的字", phrase:"<span class='highlight-y'>__</span>伟", opts:["宏", "洪"], ans:"宏", why:"宏(hóng)伟指规模大，宝盖头。" },
        { t:"同音辨析", inst:"选出正确的字", phrase:"<span class='highlight-y'>__</span>水", opts:["洪", "宏"], ans:"洪", why:"洪水要用三点水。" },
        { t:"同音辨析", inst:"选出正确的字", phrase:"<span class='highlight-y'>__</span>运当头", opts:["鸿", "红"], ans:"鸿", why:"鸿(hóng)运指大运气，鸿雁传书。" },
        { t:"同音辨析", inst:"选出正确的字", phrase:"<span class='highlight-y'>__</span>音", opts:["噪", "燥"], ans:"噪", why:"噪音用口吵，干燥用火烤。" },
        { t:"同音辨析", inst:"选出正确的字", phrase:"干<span class='highlight-y'>__</span>", opts:["燥", "躁"], ans:"燥", why:"干燥没水，要用火烤。" },
        { t:"同音辨析", inst:"选出正确的字", phrase:"急<span class='highlight-y'>__</span>", opts:["躁", "燥"], ans:"躁", why:"急躁得直跺脚（足字旁）。" },
        { t:"同音辨析", inst:"选出正确的字", phrase:"<span class='highlight-y'>__</span>傲", opts:["骄", "娇"], ans:"骄", why:"骄傲像马一样昂头（马字旁）。" },
        { t:"同音辨析", inst:"选出正确的字", phrase:"<span class='highlight-y'>__</span>区", opts:["郊", "效"], ans:"郊", why:"郊(jiāo)区指城外，交字旁。" },
        { t:"同音辨析", inst:"选出正确的字", phrase:"<span class='highlight-y'>__</span>气", opts:["娇", "骄"], ans:"娇", why:"娇(jiāo)气指柔弱，女字旁。" },
        { t:"同音辨析", inst:"选出正确的字", phrase:"应接不<span class='highlight-y'>__</span>", opts:["暇", "瑕"], ans:"暇", why:"目不暇接指空闲(日字旁)，瑕疵指斑点。" },
        { t:"词语档案", inst:"选词填空", phrase:"遇到事情好<span class='highlight-y'>__</span>", opts:["商量", "商讨"], ans:"商量", why:"'商量'比较口语化，适合朋友间。" },
        { t:"词语档案", inst:"选词填空", phrase:"共同<span class='highlight-y'>__</span>实施方案", opts:["商议", "商量"], ans:"商议", why:"会议上正式讨论用'商议'。" },
        { t:"词语档案", inst:"选词填空", phrase:"得知小狗丢了，感到万分<span class='highlight-y'>__</span>", opts:["悲痛", "悲伤"], ans:"悲痛", why:"'悲痛'程度更深，痛到骨子里。" },
        { t:"词语档案", inst:"选词填空", phrase:"看到衣衫褴褛的老人，感到<span class='highlight-y'>__</span>", opts:["心酸", "悲愤"], ans:"心酸", why:"同情老人的遭遇，感到心酸。" },
        { t:"词语档案", inst:"成语补全", phrase:"负<span class='highlight-y'>__</span>请罪", opts:["荆", "罪"], ans:"荆", why:"廉颇背着荆条去请罪。" },
        { t:"词语档案", inst:"成语补全", phrase:"震耳欲<span class='highlight-y'>__</span>", opts:["聋", "龙"], ans:"聋", why:"声音大得快把耳朵震聋了。" },
        { t:"词语档案", inst:"成语补全", phrase:"不<span class='highlight-y'>__</span>一顾", opts:["屑", "肖"], ans:"屑", why:"'屑'是碎末，指认为不值得看。" },

        { t:"结构分析", inst:"‘不 xiè’是指那是小碎末，不值得看？", phrase:"不 __", opts:["屑(尸+肖)", "宵(元宵)"], ans:"屑(尸+肖)", why:"不屑一顾的屑，是尸字头加肖。" },
        { t:"结构分析", inst:"‘心 kuàng 神怡’指心胸宽广(广)？", phrase:"心 __ 神怡", opts:["旷(日+广)", "矿(石+广)"], ans:"旷(日+广)", why:"旷达指阳光(日)照在广阔(广)的地方。" }
    ];

    let currentPool = []; let idx = 0; let score = 0; let wrongRecords = [];
    let userName = "神秘警官";

    // --- 3. 核心逻辑 ---
    window.onload = function() {
        initLevelSelect();
    }

    function initLevelSelect() {
        const select = document.getElementById('level-select');
        select.innerHTML = ""; 

        const PAGE_SIZE = 20;
        const totalDays = Math.ceil(DB.length / PAGE_SIZE);

        for(let i=1; i<=totalDays; i++) {
            let start = (i-1)*PAGE_SIZE + 1;
            let end = Math.min(i*PAGE_SIZE, DB.length);
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerText = `第 ${i} 天巡逻 (${start}-${end}题)`;
            select.appendChild(opt);
        }

        let randomOpt = document.createElement('option');
        randomOpt.value = "random";
        randomOpt.innerText = "👮 随机突击检查 (无限模式)";
        select.appendChild(randomOpt);
    }

    function startGame() {
        // 尝试恢复音效上下文
        if (AudioCtx && AudioCtx.state === 'suspended') {
            try{ AudioCtx.resume(); } catch(e){} 
        }
        
        const nameInput = document.getElementById('username').value.trim();
        if(nameInput) userName = nameInput;

        const level = document.getElementById('level-select').value;
        const PAGE_SIZE = 20;

        if (level === "random") {
            currentPool = [...DB].sort(() => Math.random() - 0.5).slice(0, 20);
        } else {
            const day = parseInt(level);
            const start = (day - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            let slice = DB.slice(start, end);
            currentPool = slice.sort(() => Math.random() - 0.5);
            
            if (currentPool.length === 0) {
                alert("本区域没有案件！");
                return;
            }
        }

        idx = 0; score = 0; wrongRecords = [];
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = currentPool[idx];
        document.getElementById('count-display').innerText = `巡逻进度: ${idx + 1}/${currentPool.length}`;
        document.getElementById('progress-bar').style.width = `${((idx+1) / currentPool.length) * 100}%`;
        document.getElementById('score-display').innerText = `警徽: ${score}`;
        document.getElementById('q-type').innerText = q.t;
        
        document.getElementById('q-main-display').innerHTML = `
            <div class="q-instruction">${q.inst}：</div>
            <div class="q-phrase">${q.phrase}</div>
        `;
        
        const grid = document.getElementById('options-grid'); grid.innerHTML = '';
        let opts = [...q.opts].sort(() => Math.random() - 0.5);
        opts.forEach(opt => {
            const btn = document.createElement('button'); btn.className = 'option-btn';
            btn.innerText = opt; 
            btn.onclick = () => { 
                playSound(600, 'sine', 0.1); 
                check(btn, opt, q); 
            };
            grid.appendChild(btn);
        });
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function check(btn, val, q) {
        document.querySelectorAll('.option-btn').forEach(b => b.onclick = null);
        const isCorrect = val === q.ans;
        if (isCorrect) {
            playSound(880, 'triangle', 0.3);
            btn.classList.add('correct'); score += 5;
            document.getElementById('fb-title').innerText = "✅ 抓捕成功！";
            document.getElementById('fb-title').style.color = "var(--correct)";
        } else {
            playSound(150, 'sawtooth', 0.4);
            btn.classList.add('wrong');
            const pureText = q.phrase.replace(/<[^>]+>/g, '');
            wrongRecords.push({ phrase: pureText, ans: q.ans });
            document.getElementById('fb-title').innerText = "❌ 嫌犯逃脱！";
            document.getElementById('fb-title').style.color = "var(--wrong)";
            document.querySelectorAll('.option-btn').forEach(b => { if(b.innerText === q.ans) b.classList.add('correct'); });
        }
        document.getElementById('fb-text').innerText = q.why;
        document.getElementById('feedback-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        idx++;
        if (idx < currentPool.length) showQuestion();
        else showResult();
    }

    function showResult() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        document.getElementById('result-name').innerText = userName;
        
        const list = document.getElementById('wrong-list');
        if (wrongRecords.length === 0) {
            list.innerHTML = "<p style='color:var(--correct)'>太棒了！辖区内治安完美，没有漏网之鱼！</p>";
        } else {
            list.innerHTML = wrongRecords.map(r => `<div class="wrong-item">${r.phrase} 👉 正确：${r.ans}</div>`).join('');
        }
    }
</script>
